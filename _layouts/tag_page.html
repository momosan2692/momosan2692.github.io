---
layout: page
---
<div id="main" role="main">
  <h1>{{ page.tag | capitalize }} Tags</h1>
  {% for post in site.posts %}
    {% if post.tags contains page.tag %}
      <article>
        <a href="{{ post.url }}">{{ post.title }}</a>
        <span>{{ post.date | date: "%B %d, %Y" }}</span>
      </article>
    {% endif %}
  {% endfor %}
</div>
