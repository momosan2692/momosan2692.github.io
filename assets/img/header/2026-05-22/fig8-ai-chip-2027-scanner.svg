<svg viewBox="0 0 860 560" xmlns="http://www.w3.org/2000/svg" font-family="'Georgia','Times New Roman',serif">
  <rect width="860" height="560" fill="#FAFAF8" rx="8"/>
  <text x="430" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#1A1A18">AI Chip 2027 Forecast — Top-Down Scanner</text>
  <text x="430" y="42" text-anchor="middle" font-size="10" fill="#8E8E88">Six layers from model architecture (largest force) to new entrants (smallest). Each with stable "ready" signal and disruptive "change" signal.</text>

