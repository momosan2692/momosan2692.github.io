  <text x="100" y="176" font-size="9" fill="#5C5C58">demand curve</text>
  <text x="100" y="190" font-size="9" fill="#5C5C58">volume + shape</text>
  <text x="230" y="164" font-size="8.5" fill="#1A6B52" font-weight="600">70% AI compute = inference</text>
  <text x="230" y="176" font-size="8" fill="#5C5C58">Token volume exponential growth</text>
  <text x="230" y="188" font-size="8" fill="#5C5C58">Billions of daily queries locked in</text>
  <text x="230" y="200" font-size="8" fill="#5C5C58">Demand curve visible 2-3 yrs out</text>
  <text x="428" y="164" font-size="8.5" fill="#854F0B" font-weight="600">Context length explosion</text>
  <text x="428" y="176" font-size="8" fill="#5C5C58">1M+ token windows → BW wall</text>
  <text x="428" y="188" font-size="8" fill="#5C5C58">Agentic: CPU+GPU+storage mix</text>
  <text x="428" y="200" font-size="8" fill="#5C5C58">Heterogeneous, not GPU-only</text>
  <text x="626" y="164" font-size="8.5" fill="#3C3489" font-weight="600">Memory BW is the constraint</text>
  <text x="626" y="176" font-size="8" fill="#5C5C58">HBM4/4E beats raw FLOPS</text>
  <text x="626" y="188" font-size="8" fill="#5C5C58">Context memory (CMX) platforms</text>
  <text x="626" y="200" font-size="8" fill="#5C5C58">emerge as infrastructure layer</text>

