  <text x="100" y="90" font-size="9" font-weight="700" fill="#3C3489">① Model</text>
  <text x="100" y="102" font-size="9" fill="#5C5C58">architecture</text>
  <text x="100" y="114" font-size="9" fill="#5C5C58">evolution</text>
  <text x="100" y="128" font-size="8" fill="#8E8E88">Biggest force</text>
  <text x="230" y="90" font-size="8.5" fill="#1A6B52" font-weight="600">Dense Transformer is solved</text>
  <text x="230" y="102" font-size="8" fill="#5C5C58">Fixed batch, predictable KV cache</text>
  <text x="230" y="114" font-size="8" fill="#5C5C58">Static memory access patterns</text>
  <text x="230" y="126" font-size="8" fill="#5C5C58">ASIC advantage clear, measurable</text>
  <text x="428" y="90" font-size="8.5" fill="#854F0B" font-weight="600">Agentic / reasoning models</text>
  <text x="428" y="102" font-size="8" fill="#5C5C58">o3-class: iterative, tree-search</text>
  <text x="428" y="114" font-size="8" fill="#5C5C58">Dynamic batch, non-deterministic</text>
  <text x="428" y="126" font-size="8" fill="#5C5C58">Inference resembles training</text>
  <text x="626" y="90" font-size="8.5" fill="#3C3489" font-weight="600">Fixed-function ASICs lose edge</text>
  <text x="626" y="102" font-size="8" fill="#5C5C58">Programmable dataflow required</text>
  <text x="626" y="114" font-size="8" fill="#5C5C58">not just raw throughput</text>
  <text x="626" y="126" font-size="8" fill="#5C5C58">New design requirement for 2027</text>

