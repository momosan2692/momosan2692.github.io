  <text x="56" y="244" font-size="9" font-weight="700" fill="#3C3489">Net result: </text>
  <text x="110" y="244" font-size="9" fill="#444441">MSFT anchor path is closed. Conditional structure active — OpenAI seeking alternative buyers. $97B cash savings create narrow self-financing path.</text>
  <text x="56" y="258" font-size="9" fill="#444441">Nvidia is the structural winner of every month Jalapeño remains stalled — Vera CPU now shipping directly to OpenAI.</text>

  <text x="430" y="292" text-anchor="middle" font-size="8.5" fill="#AAAAA4">Fig 6 · Project Nexus May 2026 Status Timeline | momosan2692.github.io</text>
