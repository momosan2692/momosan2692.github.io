<svg viewBox="0 0 860 380" xmlns="http://www.w3.org/2000/svg" font-family="'Georgia', 'Times New Roman', serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#AFA9EC"/>
    </marker>
  </defs>

  <rect width="860" height="380" fill="#FAFAF8" rx="8"/>
  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1A1A18">Google TPU — 10-Year Vertical Integration Arc (2015–2026)</text>
  <text x="430" y="44" text-anchor="middle" font-size="10" fill="#8E8E88">The only completed proof-of-concept: inference-only ASIC → full commercial vertical platform</text>

  <!-- spine line -->
  <line x1="60" y1="160" x2="820" y2="160" stroke="#D8D7D0" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- axis labels -->
  <text x="60" y="175" text-anchor="middle" font-size="8.5" fill="#AAAAA4">2015</text>
  <text x="820" y="175" text-anchor="middle" font-size="8.5" fill="#AAAAA4">2027+</text>

  <!-- ── Node positions: v1=80, v2=190, v3=300, v4=420, v5=510, v6=610, v7=710, v8=800 -->

  <!-- V1 2015 -->
  <circle cx="80" cy="160" r="9" fill="#D8D7D0" stroke="white" stroke-width="2"/>
  <text x="80" y="198" text-anchor="middle" font-size="9" font-weight="700" fill="#5C5C58">v1</text>
  <text x="80" y="209" text-anchor="middle" font-size="8" fill="#8E8E88">2015</text>
  <!-- card above -->
  <rect x="20" y="60" width="120" height="82" rx="5" fill="white" stroke="#D8D7D0" stroke-width="0.8"/>
  <line x1="80" y1="142" x2="80" y2="110" stroke="#D8D7D0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="28" y="64" width="104" height="14" rx="3" fill="#F1EFE8"/>
  <text x="80" y="74" text-anchor="middle" font-size="8.5" font-weight="700" fill="#444441">Inference Only</text>
  <text x="80" y="88" text-anchor="middle" font-size="8" fill="#5C5C58">First ASIC for</text>
  <text x="80" y="98" text-anchor="middle" font-size="8" fill="#5C5C58">AlphaGo (2016)</text>
  <text x="80" y="110" text-anchor="middle" font-size="8" fill="#5C5C58">Internal only</text>
  <text x="80" y="120" text-anchor="middle" font-size="8" fill="#8E8E88">Broadcom partner</text>
  <text x="80" y="130" text-anchor="middle" font-size="8" fill="#8E8E88">begins</text>

  <!-- V2 2018 -->
  <circle cx="190" cy="160" r="9" fill="#AFA9EC" stroke="white" stroke-width="2"/>
  <text x="190" y="198" text-anchor="middle" font-size="9" font-weight="700" fill="#5C5C58">v2</text>
  <text x="190" y="209" text-anchor="middle" font-size="8" fill="#8E8E88">2018</text>
  <rect x="134" y="220" width="112" height="76" rx="5" fill="white" stroke="#D8D7D0" stroke-width="0.8"/>
  <line x1="190" y1="178" x2="190" y2="220" stroke="#D8D7D0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="142" y="224" width="96" height="14" rx="3" fill="#EEEDFE"/>
  <text x="190" y="234" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3C3489">Training Added</text>
  <text x="190" y="248" text-anchor="middle" font-size="8" fill="#5C5C58">Distributed shared</text>
  <text x="190" y="258" text-anchor="middle" font-size="8" fill="#5C5C58">memory; training</text>
  <text x="190" y="268" text-anchor="middle" font-size="8" fill="#5C5C58">workload support</text>
  <text x="190" y="280" text-anchor="middle" font-size="8" fill="#8E8E88">External GCS access</text>

  <!-- V3 2020 -->
  <circle cx="300" cy="160" r="9" fill="#AFA9EC" stroke="white" stroke-width="2"/>
  <text x="300" y="198" text-anchor="middle" font-size="9" font-weight="700" fill="#5C5C58">v3</text>
  <text x="300" y="209" text-anchor="middle" font-size="8" fill="#8E8E88">2020</text>
  <rect x="246" y="60" width="108" height="76" rx="5" fill="white" stroke="#D8D7D0" stroke-width="0.8"/>
  <line x1="300" y1="142" x2="300" y2="110" stroke="#D8D7D0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="254" y="64" width="92" height="14" rx="3" fill="#F1EFE8"/>
  <text x="300" y="74" text-anchor="middle" font-size="8.5" font-weight="700" fill="#444441">Liquid Cooling</text>
  <text x="300" y="88" text-anchor="middle" font-size="8" fill="#5C5C58">Higher power</text>
  <text x="300" y="98" text-anchor="middle" font-size="8" fill="#5C5C58">envelope; large</text>
  <text x="300" y="108" text-anchor="middle" font-size="8" fill="#5C5C58">pod architecture</text>
  <text x="300" y="124" text-anchor="middle" font-size="8" fill="#8E8E88">Thermal stability</text>

  <!-- V4 2022 -->
  <circle cx="430" cy="160" r="10" fill="#7F77DD" stroke="white" stroke-width="2"/>
  <text x="430" y="198" text-anchor="middle" font-size="9" font-weight="700" fill="#3C3489">v4</text>
  <text x="430" y="209" text-anchor="middle" font-size="8" fill="#8E8E88">2022</text>
  <rect x="370" y="220" width="120" height="82" rx="5" fill="white" stroke="#AFA9EC" stroke-width="1"/>
  <line x1="430" y1="178" x2="430" y2="220" stroke="#AFA9EC" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="378" y="224" width="104" height="14" rx="3" fill="#EEEDFE"/>
  <text x="430" y="234" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3C3489">3D Torus Network</text>
  <text x="430" y="248" text-anchor="middle" font-size="8" fill="#5C5C58">6-neighbour topology;</text>
  <text x="430" y="258" text-anchor="middle" font-size="8" fill="#5C5C58">4,096-chip pods;</text>
  <text x="430" y="268" text-anchor="middle" font-size="8" fill="#5C5C58">2.7× perf/watt vs v3</text>
  <text x="430" y="280" text-anchor="middle" font-size="8" fill="#8E8E88">Sparse Core added</text>
  <text x="430" y="290" text-anchor="middle" font-size="8" fill="#8E8E88">for embedding tables</text>

  <!-- V6 Trillium 2024 -->
  <circle cx="570" cy="160" r="10" fill="#534AB7" stroke="white" stroke-width="2"/>
  <text x="570" y="198" text-anchor="middle" font-size="9" font-weight="700" fill="#3C3489">v6</text>
  <text x="570" y="209" text-anchor="middle" font-size="8" fill="#8E8E88">2024</text>
  <rect x="510" y="60" width="120" height="82" rx="5" fill="white" stroke="#AFA9EC" stroke-width="1"/>
  <line x1="570" y1="142" x2="570" y2="110" stroke="#AFA9EC" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="518" y="64" width="104" height="14" rx="3" fill="#EEEDFE"/>
  <text x="570" y="74" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3C3489">Trillium — LLM Native</text>
  <text x="570" y="88" text-anchor="middle" font-size="8" fill="#5C5C58">MLP core for</text>
  <text x="570" y="98" text-anchor="middle" font-size="8" fill="#5C5C58">Transformer; 4.7×</text>
  <text x="570" y="108" text-anchor="middle" font-size="8" fill="#5C5C58">over v5e; 32GB HBM</text>
  <text x="570" y="122" text-anchor="middle" font-size="8" fill="#8E8E88">100,000+ chips</text>
  <text x="570" y="132" text-anchor="middle" font-size="8" fill="#8E8E88">deployed (GCP GA)</text>

  <!-- V7 Ironwood 2025 -->
  <circle cx="700" cy="160" r="12" fill="#3C3489" stroke="#7F77DD" stroke-width="3"/>
  <text x="700" y="198" text-anchor="middle" font-size="9" font-weight="700" fill="#3C3489">v7</text>
  <text x="700" y="209" text-anchor="middle" font-size="8" fill="#3C3489">2025</text>
  <rect x="634" y="220" width="132" height="100" rx="5" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1.2"/>
  <line x1="700" y1="178" x2="700" y2="220" stroke="#7F77DD" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="642" y="224" width="116" height="16" rx="3" fill="#3C3489"/>
  <text x="700" y="235" text-anchor="middle" font-size="8.5" font-weight="700" fill="white">Ironwood — Inference-First</text>
  <text x="700" y="250" text-anchor="middle" font-size="8" fill="#3C3489">Chiplet architecture (D2D);</text>
  <text x="700" y="260" text-anchor="middle" font-size="8" fill="#3C3489">192GB HBM3e; 4,614 TFLOPs</text>
  <text x="700" y="270" text-anchor="middle" font-size="8" fill="#3C3489">9,216-chip Superpod;</text>
  <text x="700" y="280" text-anchor="middle" font-size="8" fill="#3C3489">1M+ chips (Anthropic)</text>
  <text x="700" y="292" text-anchor="middle" font-size="8" fill="#534AB7">Commercial external GCP</text>
  <text x="700" y="302" text-anchor="middle" font-size="8" fill="#534AB7">2× perf/watt vs Trillium</text>
  <text x="700" y="312" text-anchor="middle" font-size="8.5" font-weight="600" fill="#3C3489">★ First inference-dedicated TPU</text>

  <!-- V8 2026 dashed -->
  <circle cx="800" cy="160" r="9" fill="none" stroke="#5DCAA5" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="800" y="198" text-anchor="middle" font-size="9" font-weight="700" fill="#1A6B52">v8</text>
  <text x="800" y="209" text-anchor="middle" font-size="8" fill="#1A6B52">2026</text>
  <rect x="740" y="60" width="110" height="76" rx="5" fill="white" stroke="#8FCFBE" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="800" y1="142" x2="800" y2="110" stroke="#8FCFBE" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="748" y="64" width="94" height="14" rx="3" fill="#E4F5EE"/>
  <text x="795" y="74" text-anchor="middle" font-size="8.5" font-weight="700" fill="#1A6B52">v8i / v8t Split</text>
  <text x="795" y="88" text-anchor="middle" font-size="8" fill="#5C5C58">First generation to</text>
  <text x="795" y="98" text-anchor="middle" font-size="8" fill="#5C5C58">separate training</text>
  <text x="795" y="108" text-anchor="middle" font-size="8" fill="#5C5C58">and inference chips</text>
  <text x="795" y="124" text-anchor="middle" font-size="8" fill="#8E8E88">Marvell joins as</text>
  <text x="795" y="134" text-anchor="middle" font-size="8" fill="#8E8E88">3rd design partner</text>

  <!-- key insight bar -->
  <rect x="30" y="335" width="800" height="32" rx="5" fill="white" stroke="#AFA9EC" stroke-width="1"/>
  <rect x="30" y="335" width="5" height="32" rx="3" fill="#3C3489"/>
  <text x="46" y="349" font-size="9" font-weight="700" fill="#3C3489">Key insight: </text>
  <text x="114" y="349" font-size="9" fill="#444441">v8 generation is the first to split training and inference into separate chips — structural validation of the inference ASIC thesis.</text>
  <text x="46" y="361" font-size="9" fill="#5C5C58">Google's vertically integrated Model+Silicon+Cloud stack is the only complete proof that Model B ownership converges to full vertical over ~10 chip generations.</text>

  <text x="430" y="376" text-anchor="middle" font-size="8.5" fill="#AAAAA4">Fig 2 · Google TPU Vertical Integration Timeline | momosan2692.github.io</text>
</svg>
